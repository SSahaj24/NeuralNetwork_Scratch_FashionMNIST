program: wandb_script.py
method: bayes
metric:
  name: test_accuracy
  goal: maximize

parameters:
  optimizer:
    values: [SGD, MomentumGD, RMSprop, Adam, Nadam]
  lr:
    distribution: log_uniform_values
    min: 1e-4
    max: 1e-2
  beta1:
    values: [0.85, 0.9, 0.95]
  beta2:
    values: [0.99, 0.999]
  batch_size:
    values: [32, 64, 128]
  hidden_units:
    values: [64, 128, 256]
  activation:
    values: [relu, tanh]
  label_smoothing:
    values: [0, 0.05, 0.1]
  epochs:
    values: [10, 15, 20]
  kernel_initializer:
    values: [xavier, random]
